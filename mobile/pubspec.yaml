name: lalo
description: Adaptive Voice/Video Call Client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  # WebRTC
  flutter_webrtc: ^0.12.0
  # Signaling
  web_socket_channel: ^3.0.0
  # CallKit / ConnectionService
  callkeep: ^0.4.1
  # Push notifications
  firebase_messaging: ^15.0.0
  firebase_core: ^3.0.0
  # State management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0
  # HTTP client
  dio: ^5.4.0
  # Secure storage
  flutter_secure_storage: ^9.2.0
  # Utilities
  uuid: ^4.3.0
  equatable: ^2.0.0
  json_annotation: ^4.9.0
  logging: ^1.2.0
  battery_plus: ^6.1.0
  connectivity_plus: ^6.0.0
  wakelock_plus: ^1.2.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  mockito: ^5.4.0
  build_verify: ^3.1.0
  test: ^1.29.0

flutter:
  uses-material-design: true
