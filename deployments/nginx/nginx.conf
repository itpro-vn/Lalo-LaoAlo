# Nginx API Gateway for Lalo Call Services
# Routes: /ws → Signaling, /api/v1/* → Orchestrator, /v1/push/* → Push Gateway

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use kqueue;  # macOS; change to epoll on Linux
}

http {
    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # --- Rate Limiting Zones ---
    # Global CPS limit: 500 calls/second
    limit_req_zone $binary_remote_addr zone=global_cps:10m rate=500r/s;
    # Per-IP connection limit
    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;
    # Per-IP request rate
    limit_req_zone $binary_remote_addr zone=per_ip_rate:10m rate=60r/s;

    # --- Upstream Backends ---
    upstream signaling {
        server signaling:8080;
        # Add more instances for HA:
        # server signaling-2:8080;
    }

    upstream orchestrator {
        server orchestrator:8081;
        # server orchestrator-2:8081;
    }

    upstream push_gateway {
        server push:8082;
    }

    # --- Maps ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # --- HTTPS Server ---
    server {
        listen 443 ssl;
        server_name call.lalo.dev;

        # TLS 1.3 only
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.3;
        ssl_prefer_server_ciphers off;

        # --- Security Headers ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "no-referrer" always;

        # CORS: reject all (mobile-only, no web)
        # No Access-Control-Allow-Origin header = blocked

        # --- Connection Limits ---
        limit_conn per_ip_conn 50;

        # --- WebSocket: /ws → Signaling Server ---
        location /ws {
            limit_req zone=per_ip_rate burst=10 nodelay;

            proxy_pass http://signaling;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeouts
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Disable buffering for WebSocket
            proxy_buffering off;
        }

        # --- REST API: /api/v1/* → Session Orchestrator ---
        location /api/v1/ {
            limit_req zone=per_ip_rate burst=20 nodelay;
            limit_req zone=global_cps burst=100 nodelay;

            proxy_pass http://orchestrator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # --- Push API: /v1/push/* → Push Gateway ---
        location /v1/push/ {
            limit_req zone=per_ip_rate burst=5 nodelay;

            proxy_pass http://push_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
            proxy_send_timeout 5s;
        }

        # --- LiveKit Webhook → Orchestrator ---
        location /webhook/livekit {
            proxy_pass http://orchestrator;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- Health Check (gateway itself) ---
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"gateway"}';
            add_header Content-Type application/json;
        }

        # --- Default: 404 ---
        location / {
            return 404 '{"error":"not_found"}';
            add_header Content-Type application/json;
        }
    }

    # --- HTTP → HTTPS Redirect ---
    server {
        listen 80;
        server_name call.lalo.dev;
        return 301 https://$host$request_uri;
    }

    # --- Health Check (plain HTTP for LB/K8s probes) ---
    server {
        listen 8888;
        server_name _;

        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
