# coturn TURN server configuration
# See: https://github.com/coturn/coturn/wiki/turnserver

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Public IP — override via TURN_EXTERNAL_IP env or detect automatically
# external-ip=<public-ip>

# Relay
relay-ip=0.0.0.0
min-port=49152
max-port=65535

# Authentication — HMAC-based, shared secret with backend
use-auth-secret
static-auth-secret=${TURN_SECRET:-lalo-turn-dev-secret}
realm=call.lalo.dev

# Quotas
total-quota=100
user-quota=5
max-bps=0

# TLS — mount certs for production
# cert=/etc/ssl/turn_cert.pem
# pkey=/etc/ssl/turn_key.pem

# Logging
log-file=stdout
verbose

# Security
no-cli
no-multicast-peers
no-loopback-peers
stale-nonce=600

# Allocation TTL
channel-lifetime=600
permission-lifetime=300

# Fingerprinting
fingerprint

# Prometheus-compatible stats via CLI (disabled above, use syslog or external exporter)
# For prometheus, use coturn-exporter sidecar
