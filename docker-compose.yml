services:
  postgres:
    image: postgres:16-alpine
    container_name: lalo-postgres
    environment:
      POSTGRES_USER: lalo
      POSTGRES_PASSWORD: lalo_dev
      POSTGRES_DB: lalo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lalo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lalo-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    container_name: lalo-nats
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: lalo-clickhouse
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:4.6-alpine
    container_name: lalo-coturn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-49252:49152-49252/udp" # subset of relay ports for local dev
    environment:
      TURN_SECRET: lalo-turn-dev-secret
    command: >
      turnserver
      --listening-port=3478
      --tls-listening-port=5349
      --listening-ip=0.0.0.0
      --relay-ip=0.0.0.0
      --min-port=49152
      --max-port=49252
      --use-auth-secret
      --static-auth-secret=$${TURN_SECRET}
      --realm=call.lalo.dev
      --total-quota=100
      --user-quota=5
      --no-cli
      --no-multicast-peers
      --no-loopback-peers
      --fingerprint
      --log-file=stdout
      --verbose
    healthcheck:
      test: ["CMD", "turnutils_stunclient", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 3

  livekit:
    image: livekit/livekit-server:latest
    container_name: lalo-livekit
    ports:
      - "7880:7880" # HTTP + WebSocket
      - "7881:7881" # RTC TCP fallback
      - "50000-50060:50000-50060/udp" # WebRTC (subset for local dev)
    volumes:
      - ./deployments/livekit/livekit.yaml:/etc/livekit.yaml
    command: ["--config", "/etc/livekit.yaml"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7880"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    image: nginx:1.27-alpine
    container_name: lalo-gateway
    ports:
      - "80:80"
      - "443:443"
      - "8888:8888" # healthz for K8s probes
    volumes:
      - ./deployments/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - postgres
      - redis
      - nats
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  nats_data:
  clickhouse_data:
